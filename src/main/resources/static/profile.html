<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - SmartJob</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#6366f1', secondary: '#a855f7' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], poppins: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-x-hidden">

    <!-- Sidebar (Same as Dashboard) -->
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white border-r border-slate-200 z-50 transition-all duration-300 overflow-hidden">
        <div class="p-6 flex items-center space-x-3 mb-8">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white flex-shrink-0 shadow-lg shadow-indigo-100">
                <i class="fas fa-briefcase text-xl"></i>
            </div>
            <span class="text-xl font-bold font-poppins sidebar-text">SmartJob</span>
        </div>

        <nav class="px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center space-x-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-xl font-medium transition-all group">
                <i class="fas fa-th-large w-6 text-center group-hover:text-indigo-600"></i>
                <span class="sidebar-text">Dashboard</span>
            </a>
            <a href="users.html" class="flex items-center space-x-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-xl font-medium transition-all group">
                <i class="fas fa-users w-6 text-center group-hover:text-indigo-600"></i>
                <span class="sidebar-text">Users</span>
            </a>
            <a href="data-management.html" class="flex items-center space-x-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-xl font-medium transition-all group">
                <i class="fas fa-database w-6 text-center group-hover:text-indigo-600"></i>
                <span class="sidebar-text">Data Mgmt</span>
            </a>
            <a href="analytics.html" class="flex items-center space-x-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-xl font-medium transition-all group">
                <i class="fas fa-chart-pie w-6 text-center group-hover:text-indigo-600"></i>
                <span class="sidebar-text">Analytics</span>
            </a>
            <div class="pt-4 pb-2 px-4 text-xs font-bold text-slate-400 uppercase tracking-widest sidebar-text">Personal</div>
            <a href="profile.html" class="flex items-center space-x-3 px-4 py-3 bg-indigo-50 text-indigo-600 rounded-xl font-bold transition-all group">
                <i class="fas fa-user-circle w-6 text-center"></i>
                <span class="sidebar-text">My Profile</span>
            </a>
            <a href="index.html" class="flex items-center space-x-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-xl font-medium transition-all group">
                <i class="fas fa-sign-out-alt w-6 text-center"></i>
                <span class="sidebar-text">Logout</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="ml-64 min-h-screen transition-all duration-300">
        <!-- Top Navbar -->
        <header class="h-20 bg-white border-b border-slate-200 sticky top-0 z-40 px-8 flex items-center justify-between">
            <h1 class="text-xl font-bold font-poppins text-slate-800">My Profile</h1>
            <button class="btn-gradient text-white px-6 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-100 flex items-center space-x-2">
                <i class="fas fa-save text-xs"></i>
                <span>Save Changes</span>
            </button>
        </header>

        <div class="p-8 space-y-8 animate-fadeIn">
            <!-- Profile Header Card -->
            <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                <div class="h-48 btn-gradient relative">
                    <button class="absolute bottom-6 right-8 px-4 py-2 bg-white/20 backdrop-blur-md text-white rounded-xl border border-white/30 text-xs font-bold hover:bg-white/30 transition-all">
                        <i class="fas fa-camera mr-2"></i> Change Cover
                    </button>
                </div>
                <div class="px-12 pb-12 -mt-16">
                    <div class="flex flex-col md:flex-row md:items-end justify-between gap-8">
                        <div class="flex flex-col md:flex-row items-center md:items-end space-y-4 md:space-y-0 md:space-x-8">
                            <div class="relative">
                                <img src="https://i.pravatar.cc/150?u=12" class="w-40 h-40 rounded-[3rem] border-8 border-white shadow-2xl object-cover">
                                <button class="absolute bottom-2 right-2 w-10 h-10 bg-indigo-600 text-white rounded-2xl border-4 border-white flex items-center justify-center shadow-lg hover:bg-indigo-700 transition-all">
                                    <i class="fas fa-pen text-xs"></i>
                                </button>
                            </div>
                            <div class="text-center md:text-left pb-4">
                                <h2 class="text-3xl font-extrabold font-poppins text-slate-900">Alex Johnson</h2>
                                <p class="text-slate-500 font-medium">Senior Product Designer & Administrator</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-4 pb-4">
                            <div class="px-6 py-3 bg-slate-50 rounded-2xl border border-slate-100 text-center">
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Projects</p>
                                <p class="text-xl font-extrabold text-slate-800">24</p>
                            </div>
                            <div class="px-6 py-3 bg-slate-50 rounded-2xl border border-slate-100 text-center">
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Followers</p>
                                <p class="text-xl font-extrabold text-slate-800">1.2k</p>
                            </div>
                        </div>
                    </div>

                    <!-- Profile Tabs -->
                    <div class="mt-12 border-b border-slate-100 flex items-center space-x-8">
                        <button class="pb-4 border-b-4 border-indigo-600 text-indigo-600 font-bold text-sm">General Info</button>
                        <button class="pb-4 border-b-4 border-transparent text-slate-400 font-bold text-sm hover:text-slate-600 transition-all">Skills & Expertise</button>
                        <button class="pb-4 border-b-4 border-transparent text-slate-400 font-bold text-sm hover:text-slate-600 transition-all">Security</button>
                        <button class="pb-4 border-b-4 border-transparent text-slate-400 font-bold text-sm hover:text-slate-600 transition-all">Notifications</button>
                    </div>

                    <!-- Profile Form -->
                    <div class="mt-12 grid grid-cols-1 lg:grid-cols-2 gap-12">
                        <div class="space-y-8">
                            <h3 class="text-xl font-bold font-poppins text-slate-800 flex items-center">
                                <i class="fas fa-user-circle mr-3 text-indigo-500"></i>
                                Personal Information
                            </h3>
                            <div class="grid grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-sm font-bold text-slate-700">First Name</label>
                                    <input type="text" value="Alex" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-sm font-bold text-slate-700">Last Name</label>
                                    <input type="text" value="Johnson" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">Email Address</label>
                                <input type="email" value="alex.j@smartjob.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">Bio / About</label>
                                <textarea rows="4" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium">I'm a passionate product designer with over 8 years of experience in creating modern user interfaces and experiences for leading tech companies.</textarea>
                            </div>
                        </div>

                        <div class="space-y-8">
                            <h3 class="text-xl font-bold font-poppins text-slate-800 flex items-center">
                                <i class="fas fa-tools mr-3 text-purple-500"></i>
                                Professional Details
                            </h3>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">Occupation</label>
                                <input type="text" value="Senior Product Designer" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">Company</label>
                                <input type="text" value="SmartJob Portal" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">Location</label>
                                <input type="text" value="San Francisco, CA" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">Website</label>
                                <input type="url" value="https://alexj.design" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/script.js"></script>
</body>
</html>
